poddle:
  version: "1.0"
  project: google maps
  appName: maps-management-service
  type: WEB_SERVICE
  health: /health
  port: 8080
  env:
    production:
      branch: main
      entryPoint: index.js
      domain: api.google.poddleops.com
      specs:
        compute:
          cpu: 2
          memory: 2
          storage: 30
          autoScaling:
            replica:
              min: 1
              max: 3
        database:
          cpu: 2
          memory: 1
          storage: 30
          engine: postgres
          version: "16"
      variables:
        BASE_URL: /api/v1
        DATABASE_URL: "#{dbUrl}"
        DATABASE_PORT: "#{dbPort}"
        DATABASE_USERNAME: "#{dbUsername}"
        DATABASE_PASSWORD: "#{dbPassword}"
